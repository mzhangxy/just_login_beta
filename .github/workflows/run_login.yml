name: Auto Login Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'   # 每2天 00:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install selenium==4.25.* undetected-chromedriver==3.5.* 2captcha-python fake-useragent

    - name: Install Chrome dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-liberation libappindicator3-1 ...  # 上面列的长列表

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
        install-chromedriver: false   # 让 uc 自己处理

    - name: Run Python Script
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        GITHUB_ACTIONS: "true"
      run: python main.py

    - name: Commit and push updated cookies
      if: always()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add cookies.json
        git commit -m "Update cookies from bot run [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
        git push || echo "Push failed (maybe no changes or permission)"

    - name: Upload Debug Files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-files-${{ github.run_id }}
        path: |
          *debug*.png
        retention-days: 7

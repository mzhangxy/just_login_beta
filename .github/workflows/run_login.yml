name: Auto Login Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 每2天 UTC 00:00 运行一次，可根据需要调整

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # 防止意外卡死

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install \
          selenium==4.25.* \
          undetected-chromedriver==3.5.* \
          2captcha-python \
          fake-useragent

    - name: Setup Chrome (with dependencies)
      uses: browser-actions/setup-chrome@v1   # 或升级到 @v2 如果仓库已支持
      with:
        chrome-version: stable
        install-dependencies: true             # 关键：自动安装所需 libs
        install-chromedriver: false            # 让 undetected_chromedriver 处理 driver

    - name: Run Python Script
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_ACTIONS: "true"
      run: python main.py

    - name: Commit and push updated cookies.json (if changed)
      if: always()
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add cookies.json || true
        git commit -m "Update cookies from bot run [$(date '+%Y-%m-%d %H:%M UTC')]" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }} || echo "Push failed (no changes or permission issue)"

    - name: Upload Debug Artifacts (screenshots & logs)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-files-${{ github.run_id }}
        path: |
          *.png
        retention-days: 2

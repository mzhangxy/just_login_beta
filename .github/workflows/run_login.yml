name: Auto Login Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools
        pip install --upgrade undetected-chromedriver selenium 2captcha-python fake-useragent

    - name: Setup Chrome for Testing
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Run Python Script
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        GITHUB_ACTIONS: "true"
      run: python main.py

    - name: Commit and push updated cookies
      if: always()  # 即使失败也运行
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add cookies.json
        git commit -m "Update cookies from bot run" || echo "No changes to commit"
        git push

    - name: Upload Debug Files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-files
        path: |
          *debug*.png
          *.log
        retention-days: 3

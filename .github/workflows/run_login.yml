name: Auto Login Bot

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    - cron: '0 0 * * *'       # 每天 UTC 0点（北京时间早上8点）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # 升级到 v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade undetected-chromedriver selenium twocaptcha fake-useragent

    - name: Setup Chrome for Testing (recommended for undetected_chromedriver)
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable     # 自动安装最新稳定版 Chrome for Testing
        install-chromedriver: true # 同时安装匹配的 ChromeDriver（可选，但保险）

    - name: Run Python Script
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        GITHUB_ACTIONS: "true"
      run: python main.py

    - name: Upload Debug Screenshots & Logs
      if: always()                # 无论成功失败都上传，便于 debug
      uses: actions/upload-artifact@v4
      with:
        name: debug-files
        path: |
          *debug*.png
          *.log
        retention-days: 3         # 多保留几天
